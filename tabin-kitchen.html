<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>The Aroma — Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAF6EE;--dark:#1C1208;--terra:#4D2E18;--red:#8B6040;--amber:#C4A96B;--green:#6B8C42;--card:#F5EFE0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}

/* HEADER */
.header{background:var(--terra);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:#FAF6EE;font-weight:900;}
.logo span{color:var(--amber);}
.header-badge{background:var(--red);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.live-indicator{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(250,246,238,0.7);}
.dot{width:8px;height:8px;border-radius:50%;background:#6B8C42;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* STATS BAR */
.stats-bar{background:var(--card);border-bottom:1px solid rgba(77,46,24,0.1);padding:12px 24px;display:flex;gap:20px;overflow-x:auto;}
.stat-pill{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid rgba(77,46,24,0.12);border-radius:10px;padding:8px 14px;flex-shrink:0;}
.stat-num{font-size:20px;font-weight:800;color:var(--red);font-family:'Playfair Display',serif;}
.stat-lbl{font-size:11px;color:rgba(28,18,8,0.5);font-weight:600;line-height:1.3;}

/* BILL ALERT */
.bill-alert{background:linear-gradient(135deg,#7a3e28,#e63946);margin:16px 24px;border-radius:14px;padding:14px 18px;display:none;}
.bill-alert.show{display:block;}
.bill-alert-title{color:#fff;font-size:14px;font-weight:800;margin-bottom:8px;}
.bill-request-card{background:rgba(255,255,255,0.15);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;color:#fff;}
.bill-done-btn{background:#fff;color:#7a3e28;border:none;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ORDERS GRID */
.section{padding:0 24px 24px;}
.section-title{font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(28,18,8,0.4);text-transform:uppercase;margin:20px 0 12px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:rgba(77,46,24,0.1);}
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}

.order-card{background:var(--card);border-radius:16px;overflow:hidden;border:1.5px solid rgba(77,46,24,0.12);transition:all 0.3s;}
.order-card.status-new{border-color:rgba(139,96,64,0.5);box-shadow:0 4px 20px rgba(139,96,64,0.1);}
.order-card.status-preparing{border-color:rgba(196,169,107,0.5);}
.order-card.status-ready{border-color:rgba(107,140,66,0.5);opacity:0.8;}
.order-card.status-cancelled{border-color:rgba(122,62,40,0.4);opacity:0.6;background:rgba(122,62,40,0.03);}
.card-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(77,46,24,0.08);}
.card-table{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--terra);}
.card-timer{font-size:13px;font-weight:700;padding:4px 10px;border-radius:8px;}
.timer-new{background:rgba(139,96,64,0.12);color:var(--red);}
.timer-mid{background:rgba(196,169,107,0.2);color:#a0620a;}
.timer-late{background:rgba(122,62,40,0.1);color:#7a3e28;}
.timer-done{background:rgba(107,140,66,0.1);color:var(--green);}
.card-items{padding:12px 16px;}
.card-item-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;border-bottom:1px solid rgba(77,46,24,0.05);}
.card-item-row:last-child{border-bottom:none;}
.item-qty-badge{background:var(--terra);color:#fff;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.item-name-k{flex:1;font-weight:600;}
.item-price-k{font-size:12px;color:rgba(28,18,8,0.4);font-weight:600;}
.card-total{display:flex;justify-content:space-between;padding:8px 16px;background:rgba(77,46,24,0.04);font-size:13px;font-weight:800;color:var(--red);border-top:1px dashed rgba(77,46,24,0.15);}
.card-footer{padding:10px 14px;display:flex;gap:8px;}
.k-btn{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.btn-receive{background:var(--terra);color:#fff;}
.btn-cancel{background:rgba(122,62,40,0.1);color:#7a3e28;border:1px solid rgba(122,62,40,0.2);}
.btn-ready{background:rgba(107,140,66,0.12);color:var(--green);border:1px solid rgba(107,140,66,0.2);}
.btn-remove{background:rgba(122,62,40,0.08);color:#7a3e28;font-size:12px;}
.cancelled-msg{text-align:center;color:#7a3e28;font-size:13px;font-weight:700;padding:8px;}

/* WAITER ALERT */
#waiter-alert{display:none;position:fixed;top:80px;right:20px;background:var(--terra);color:#fff;padding:14px 20px;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.2);z-index:100;animation:slideIn 0.3s ease;}
@keyframes slideIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}
#waiter-alert button{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:5px 12px;border-radius:8px;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;display:block;font-size:12px;}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(28,18,8,0.95);color:#FAF6EE;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:rgba(28,18,8,0.3);}
.empty-icon{font-size:60px;margin-bottom:12px;}
</style>
</head>
<body>
<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">THE <span>AROMA</span></div>
    <div class="header-badge">👨‍🍳 Kitchen</div>
    <div class="live-indicator"><div class="dot"></div>Live</div>
  </div>
  <div style="color:rgba(250,246,238,0.7);font-size:13px;" id="rest-name-k">The Aroma Kitchen</div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-pill"><div class="stat-num" id="stat-new">0</div><div class="stat-lbl">New<br>Orders</div></div>
  <div class="stat-pill"><div class="stat-num" id="stat-prep">0</div><div class="stat-lbl">Being<br>Prepared</div></div>
  <div class="stat-pill"><div class="stat-num" id="stat-ready">0</div><div class="stat-lbl">Ready to<br>Serve</div></div>
  <div class="stat-pill"><div class="stat-num" id="stat-done">0</div><div class="stat-lbl">Bills<br>Requested</div></div>
</div>

<!-- BILL ALERTS -->
<div class="bill-alert" id="bill-alert">
  <div class="bill-alert-title">🧾 Bill Requests</div>
  <div id="bill-list"></div>
</div>

<!-- ORDERS -->
<div class="section">
  <div class="section-title">🔥 New Orders</div>
  <div class="orders-grid" id="new-orders"></div>
  <div class="section-title">⏳ Preparing</div>
  <div class="orders-grid" id="prep-orders"></div>
  <div class="section-title">✅ Ready</div>
  <div class="orders-grid" id="ready-orders"></div>
</div>

<!-- WAITER ALERT -->
<div id="waiter-alert">
  <div>🔔 Table <span id="waiter-table">?</span> ne waiter bulaya!</div>
  <button onclick="dismissWaiter()">✓ Dismiss</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
var orders = [];
var bills = [];
var lastWaiterTime = 0;
var lastCancelTime = 0;
var orderTimers = {};

function loadData(){
  try{
    var o = localStorage.getItem('tabin_orders');
    if(o) orders = JSON.parse(o)||[];
    var b = localStorage.getItem('tabin_bills');
    if(b) bills = JSON.parse(b)||[];
    // Settings
    var s = localStorage.getItem('tabin_settings');
    if(s){ var p=JSON.parse(s); document.getElementById('rest-name-k').textContent=(p.name||'The Aroma')+' Kitchen'; }
  }catch(e){}
}

function saveOrders(){
  try{ localStorage.setItem('tabin_orders', JSON.stringify(orders)); }catch(e){}
}

function renderKitchen(){
  var newOrds = orders.filter(function(o){return o.status==='new'||o.status==='urgent';});
  var prepOrds = orders.filter(function(o){return o.status==='preparing';});
  var readyOrds = orders.filter(function(o){return o.status==='ready';});

  document.getElementById('stat-new').textContent = newOrds.length;
  document.getElementById('stat-prep').textContent = prepOrds.length;
  document.getElementById('stat-ready').textContent = readyOrds.length;
  document.getElementById('stat-done').textContent = bills.length;

  document.getElementById('new-orders').innerHTML = newOrds.length
    ? newOrds.map(function(o,i){return buildCard(o, orders.indexOf(o));}).join('')
    : '<div class="empty"><div class="empty-icon">✅</div>No new orders</div>';

  document.getElementById('prep-orders').innerHTML = prepOrds.length
    ? prepOrds.map(function(o){return buildCard(o, orders.indexOf(o));}).join('')
    : '<div style="color:rgba(28,18,8,0.3);font-size:13px;padding:10px 0;">No orders being prepared</div>';

  document.getElementById('ready-orders').innerHTML = readyOrds.length
    ? readyOrds.map(function(o){return buildCard(o, orders.indexOf(o));}).join('')
    : '<div style="color:rgba(28,18,8,0.3);font-size:13px;padding:10px 0;">No ready orders</div>';

  // Bills
  if(bills.length){
    document.getElementById('bill-alert').classList.add('show');
    document.getElementById('bill-list').innerHTML = bills.map(function(b,i){
      return '<div class="bill-request-card">'
        +'<div><strong>Table '+b.table+'</strong> — ₹'+b.total+' ('+b.payMethod+')</div>'
        +'<button class="bill-done-btn" onclick="billDone('+i+')">Bill De Diya ✓</button>'
      +'</div>';
    }).join('');
  } else {
    document.getElementById('bill-alert').classList.remove('show');
  }
}

function buildCard(o, idx){
  var isNew = o.status==='new'||o.status==='urgent';
  var isPreparing = o.status==='preparing';
  var isReady = o.status==='ready';
  var isCancelled = o.status==='cancelled';
  var total = (o.items||[]).reduce(function(s,i){return s+(i.price||0)*i.qty;},0);

  var itemsHtml = (o.items||[]).map(function(i){
    return '<div class="card-item-row">'
      +'<div class="item-qty-badge">'+i.qty+'</div>'
      +'<div class="item-name-k">'+(i.n||i.name||'Item')+'</div>'
      +(i.price?'<div class="item-price-k">₹'+(i.price*i.qty)+'</div>':'')
    +'</div>';
  }).join('');

  var totalHtml = total>0 ? '<div class="card-total"><span>Total</span><span>₹'+total+'</span></div>' : '';

  var timerClass = isNew?'timer-new':isPreparing?'timer-mid':isReady?'timer-done':'timer-new';
  var timerText = o.timerDisplay || (isNew?'New':'') || (isPreparing?'Preparing':'') || (isReady?'✓ Ready':'');

  var footerHtml = '';
  if(isCancelled){
    footerHtml = '<div class="card-footer"><div class="cancelled-msg">❌ Customer ne cancel kiya</div></div>'
      +'<div class="card-footer"><button class="k-btn btn-remove" onclick="removeOrder('+idx+')">🗑️ Hata Do</button></div>';
  } else if(isNew){
    footerHtml = '<div class="card-footer">'
      +'<button class="k-btn btn-receive" onclick="receiveOrder('+idx+')">✅ Order Received</button>'
      +'<button class="k-btn btn-cancel" onclick="cancelFromKitchen('+idx+')">✕</button>'
    +'</div>';
  } else if(isPreparing){
    footerHtml = '<div class="card-footer">'
      +'<button class="k-btn btn-ready" onclick="markReady('+idx+')">✓ Mark Ready</button>'
    +'</div>';
  } else if(isReady){
    footerHtml = '<div class="card-footer">'
      +'<button class="k-btn btn-remove" onclick="removeOrder('+idx+')">🗑️ Served — Remove</button>'
    +'</div>';
  }

  return '<div class="order-card status-'+o.status+'">'
    +'<div class="card-header">'
      +'<div class="card-table">Table '+o.table+'</div>'
      +'<div class="card-timer '+timerClass+'">'+timerText+'</div>'
    +'</div>'
    +'<div class="card-items">'+itemsHtml+'</div>'
    +totalHtml
    +footerHtml
  +'</div>';
}

function receiveOrder(idx){
  if(!orders[idx]) return;
  orders[idx].status = 'preparing';
  orders[idx].timerDisplay = '0:00';
  orders[idx].startTime = Date.now();
  saveOrders();
  // Notify customer
  try{
    var msg = JSON.parse(localStorage.getItem('tabin_order_msg')||'{}');
    localStorage.setItem('tabin_notify', JSON.stringify({
      show:true, title:msg.title||'Order Received! 👨‍🍳', msg:msg.msg||'Kitchen mein order mil gaya!', time:Date.now()
    }));
  }catch(e){}
  showToast('📲 Table '+orders[idx].table+' — Preparing!');
  // Start auto timer
  startOrderTimer(idx);
  renderKitchen();
}

function startOrderTimer(idx){
  if(orderTimers[idx]) clearInterval(orderTimers[idx]);
  orderTimers[idx] = setInterval(function(){
    if(!orders[idx] || orders[idx].status!=='preparing'){ clearInterval(orderTimers[idx]); return; }
    var elapsed = Math.floor((Date.now() - orders[idx].startTime)/1000);
    var m = Math.floor(elapsed/60);
    var s = elapsed%60;
    orders[idx].timerDisplay = m+'m '+(s<10?'0':'')+s+'s';
    // Auto ready at 15 min
    if(elapsed >= 15*60){
      orders[idx].status='ready';
      orders[idx].timerDisplay='✓ Ready';
      clearInterval(orderTimers[idx]);
      showToast('✅ Table '+orders[idx].table+' Ready!');
      saveOrders();
    }
    renderKitchen();
  }, 1000);
}

function markReady(idx){
  if(!orders[idx]) return;
  orders[idx].status='ready';
  orders[idx].timerDisplay='✓ Ready';
  if(orderTimers[idx]) clearInterval(orderTimers[idx]);
  saveOrders();
  showToast('✅ Table '+orders[idx].table+' Ready!');
  renderKitchen();
}

function cancelFromKitchen(idx){
  if(!orders[idx]) return;
  orders[idx].status='cancelled';
  saveOrders();
  renderKitchen();
}

function removeOrder(idx){
  orders.splice(idx,1);
  saveOrders();
  renderKitchen();
}

function billDone(idx){
  try{
    var bill = bills[idx];
    // Reset table status
    localStorage.setItem('tabin_table_free', JSON.stringify({table:bill.table, time:Date.now()}));
    bills.splice(idx,1);
    localStorage.setItem('tabin_bills', JSON.stringify(bills));
    // Notify customer
    var ty = JSON.parse(localStorage.getItem('tabin_thankyou')||'{}');
    localStorage.setItem('tabin_notify_ty', JSON.stringify({show:true, title:ty.title||'Shukriya! 🙏', msg:ty.msg||'Dobara padharo!', time:Date.now()}));
  }catch(e){}
  showToast('✅ Bill de diya!');
  renderKitchen();
}

function dismissWaiter(){
  document.getElementById('waiter-alert').style.display='none';
}

// Check for new events
function pollEvents(){
  loadData();
  renderKitchen();
  // Check waiter call
  try{
    var w = localStorage.getItem('tabin_waiter');
    if(w){
      var wd = JSON.parse(w);
      if(wd && wd.time > lastWaiterTime){
        lastWaiterTime = wd.time;
        document.getElementById('waiter-table').textContent = wd.table||'?';
        var wa = document.getElementById('waiter-alert');
        wa.style.display='block';
        setTimeout(function(){wa.style.display='none';},8000);
        localStorage.removeItem('tabin_waiter');
      }
    }
  }catch(e){}
  // Check cancel
  try{
    var cc = localStorage.getItem('tabin_cancel');
    if(cc){
      var cd = JSON.parse(cc);
      if(cd && cd.time > lastCancelTime){
        lastCancelTime = cd.time;
        showToast('❌ Table '+cd.table+' ne order cancel kiya!');
        localStorage.removeItem('tabin_cancel');
      }
    }
  }catch(e){}
  // Restart timers for preparing orders
  orders.forEach(function(o,idx){
    if(o.status==='preparing' && o.startTime && !orderTimers[idx]){
      startOrderTimer(idx);
    }
  });
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._toast);
  window._toast=setTimeout(function(){t.classList.remove('show');},3000);
}

// Init
loadData();
renderKitchen();
setInterval(pollEvents, 2000);
</script>
</body>
</html>
